server {
    listen 5173;
    server_name 0.0.0.0;

    #  Include the path to your dist folder produced by Vite build
    root /absolute/path/to/vite/dist/folder;

    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://0.0.0.0:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
