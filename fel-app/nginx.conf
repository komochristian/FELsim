server {
    listen 5173;
    server_name 0.0.0.0;

    root /Users/christiankomo/Downloads/FELsim/fel-app/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Optional: proxy to FastAPI
    location /api/ {
        proxy_pass http://0.0.0.0:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
